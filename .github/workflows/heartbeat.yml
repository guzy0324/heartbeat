name: heartbeat

on:
  workflow_dispatch:
  schedule:
    # 北京时间 07:50，UTC 23:50
    - cron: "50 23 * * *"

permissions:
  contents: write

jobs:
  push-heartbeat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat file
        run: |
          mkdir -p data
          TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S %Z" > data/heartbeat.txt

      - name: Commit and push
        run: |
          git config user.name "heartbeat-bot"
          git config user.email "actions@github.com"
          git add data/heartbeat.txt
          git commit -m "heartbeat: $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S %Z')" || exit 0
          git push
